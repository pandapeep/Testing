<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Simple Webpage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      color: #333;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #0066cc;
    }
    p {
      font-size: 18px;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #004c99;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Simple Webpage</h1>
  <p>This is a basic webpage created with HTML, CSS, and a little bit of JavaScript.</p>
  <button onclick="sayHello()">Click Me</button>

  <script>
    function sayHello() {
      alert("Hello! Thanks for visiting my webpage 😊");
    }
  </script>
</body>
</html>
